services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    ports:
      - $TRANSMISSION_VPN_PORT:9091
      - $DISPATCHARR_PORT:9191
    networks:
      - proxy
      - internet
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - $TRANSMISSION_VPN_VOL_DATA:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=$TRANSMISSION_VPN_PROVIDER
      - OPENVPN_USER=$TRANSMISSION_VPN_USER
      - OPENVPN_PASSWORD=$TRANSMISSION_VPN_PASSWORD
      - SERVER_REGIONS=$TRANSMISSION_VPN_REGION
      - PRIVATE_INTERNET_ACCESS_VPN_PORT_FORWARDING=on
      - HTTPPROXY=off
      - FIREWALL_INPUT_PORTS=9091,9191
    restart: unless-stopped
  transmission:
    image: linuxserver/transmission:4.0.6@sha256:2d8d07715382a58f83fdcd1751e08c736711d76eecf71135106312fd370af933
    container_name: transmission
    restart: unless-stopped
    environment:
      - PUID=$TRANSMISSION_PUID
      - PGID=$TRANSMISSION_PGID
      - TZ=$TRANSMISSION_TZ
    volumes:
      - $TRANSMISSION_VOL_CONFIG:/config
      - $TRANSMISSION_VOL_INIT:/custom-cont-init.d:ro
      - $TRANSMISSION_VOL_DOWNLOADS:/downloads
      - $TRANSMISSION_VOL_MEDIAS:/mnt/medias
    depends_on: 
      - gluetun
    network_mode: "service:gluetun"
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:0.21.1-20260326150814@sha256:cecfadddfddee06d10e8f67bde0ae69568da76e1ae09ed20169b9ef1463a7a42
    container_name: dispatcharr
    restart: unless-stopped
    volumes:
      - $DISPATCHARR_VOL_DATA:/data
    environment:
      - DISPATCHARR_ENV=$DISPATCHARR_ENV
      - REDIS_HOST=$DISPATCHARR_REDIS_HOST
      - CELERY_BROKER_URL=$DISPATCHARR_CELERY_BROKER_URL
      - DISPATCHARR_LOG_LEVEL=$DISPATCHARR_LOG_LEVEL
    depends_on: 
      - gluetun
    network_mode: "service:gluetun"

networks:
  proxy:
    external: true
  internet:
    external: true
