services:
  freshrss:
    container_name: freshrss
    image: lscr.io/linuxserver/freshrss:1.27.1@sha256:a46d8e55100fc1fe6d5f42b74fb6319eb662366ef03cc6945a13ce049c2b835c
    environment:
      - PUID=$FRESH_RSS_PUID
      - PGID=$FRESH_RSS_PGID
      - TZ=$FRESH_RSS_TZ
    volumes:
      - $FRESH_RSS_VOL_CONFIG:/config
    ports:
      - $FRESH_RSS_PORT:80
    networks:
      - proxy
      - internet
    restart: unless-stopped

networks:
  proxy:
    external: true
  internet:
    external: true
