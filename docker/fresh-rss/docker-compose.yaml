services:
  freshrss:
    container_name: freshrss
    image: lscr.io/linuxserver/freshrss:1.26.1@sha256:12aa2cae9a38e59c2f2628a2fd78cbaf51b85da9e526654538fb545c76a93a1a
    environment:
      - PUID=$FRESH_RSS_PUID
      - PGID=$FRESH_RSS_PGID
      - TZ=$FRESH_RSS_TZ
    volumes:
      - $FRESH_RSS_VOL_CONFIG:/config
    ports:
      - $FRESH_RSS_PORT:80
    restart: unless-stopped
